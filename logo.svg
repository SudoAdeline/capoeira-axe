<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#C93D1A"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <!-- subtle texture pattern -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="soft-light"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#shine)"/>

  <!-- Capoeira silhouette — Meia Lua de Compasso (iconic spinning kick) -->
  <g transform="translate(256,260) scale(2.8)" filter="url(#grain)">
    <!-- Head -->
    <circle cx="-60" cy="18" r="16" fill="#fff" opacity="0.95"/>
    <!-- Supporting arm to ground -->
    <line x1="-50" y1="8" x2="-72" y2="42" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity="0.95"/>
    <!-- Hand on ground -->
    <circle cx="-74" cy="44" r="5" fill="#fff" opacity="0.95"/>
    <!-- Torso -->
    <line x1="-48" y1="10" x2="-20" y2="-12" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
    <!-- Spinning kick leg — the iconic arc -->
    <path d="M-20,-12 Q10,-50 65,-55" stroke="#fff" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.95"/>
    <!-- Kick foot -->
    <circle cx="67" cy="-56" r="6" fill="#FFD166" opacity="0.95"/>
    <!-- Supporting leg (bent) -->
    <path d="M-20,-12 Q-30,10 -40,30 Q-44,38 -38,42" stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.95"/>
    <!-- Foot on ground -->
    <ellipse cx="-36" cy="44" rx="8" ry="4" fill="#fff" opacity="0.95"/>
    <!-- Trailing arm (free arm, flowing back) -->
    <path d="M-34,0 Q-50,-20 -68,-14" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Motion arc / energy trail -->
  <path d="M380,90 Q320,60 270,80 Q220,100 200,140" stroke="#FFD166" stroke-width="4" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M400,110 Q340,75 280,98 Q230,118 210,155" stroke="#FFD166" stroke-width="2.5" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- AXÉ text -->
  <text x="256" y="440" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="72" fill="#fff" letter-spacing="18" opacity="0.95">AXÉ</text>
  <!-- Subtle underline accent -->
  <line x1="170" y1="455" x2="342" y2="455" stroke="#FFD166" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>
