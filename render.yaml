databases:
  - name: axe-capoeira-db
    plan: free

services:
  - type: web
    name: axe-capoeira
    runtime: node
    plan: free
    rootDir: ginga-app
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: axe-capoeira-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VITE_STRIPE_PK
        sync: false
