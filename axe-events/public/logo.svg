<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1F1209"/>
      <stop offset="100%" stop-color="#0A0604"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="50%" stop-color="#E8652B"/>
      <stop offset="100%" stop-color="#C93D1A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Warm ambient glow behind text -->
  <ellipse cx="256" cy="240" rx="160" ry="120" fill="#E8652B" opacity="0.08" filter="url(#softglow)"/>

  <!-- Main text — AXÉ large and bold -->
  <text x="256" y="280" text-anchor="middle"
        font-family="'Helvetica Neue','Arial Black',Impact,sans-serif"
        font-weight="900" font-size="160" fill="url(#textGrad)"
        letter-spacing="12" filter="url(#glow)">AXÉ</text>

  <!-- Subtitle -->
  <text x="256" y="340" text-anchor="middle"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="300" font-size="28" fill="#D4A843"
        letter-spacing="14" opacity="0.6">CAPOEIRA</text>

  <!-- Thin gold accent line -->
  <line x1="156" y1="360" x2="356" y2="360" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
